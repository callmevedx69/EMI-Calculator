<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart EMI Loan Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body class="landing-page">
    <!-- Redirect to dashboard if already logged in -->
    <script>
        // Check if user is already logged in
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const { data, error } = await window.supabaseClient.auth.getSession();
                console.log("Session:", data);
                if (data.session) {
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error("Session error:", err);
            }
        });
    </script>
    <div class="landing-container">
        <div class="landing-hero">
            <h1>Smart EMI Calculator</h1>
            <p class="tagline">Advanced Loan Management System</p>
            
            <div class="landing-features">
                <div class="feature">
                    <span class="feature-icon">🔐</span>
                    <h3>Secure Login</h3>
                    <p>Your data is protected with user authentication</p>
                </div>
                <div class="feature">
                    <span class="feature-icon">📊</span>
                    <h3>Loan Analytics</h3>
                    <p>Detailed insights and affordability checks</p>
                </div>
                <div class="feature">
                    <span class="feature-icon">💾</span>
                    <h3>Cloud Storage</h3>
                    <p>Save and access your loans anywhere</p>
                </div>
                <div class="feature">
                    <span class="feature-icon">📄</span>
                    <h3>PDF Reports</h3>
                    <p>Generate detailed loan reports</p>
                </div>
            </div>
            
            <div class="landing-actions">
                <a href="login.html" class="btn btn-primary btn-large">Get Started</a>
            </div>
        </div>
    </div>
</body>
</html>
